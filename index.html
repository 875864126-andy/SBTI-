<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商业生专属SBTI来了！你是哪种商业人格</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6366f1;--primary-dark:#4f46e5;--bg:#0f0f1a;--card:#1a1a2e;--text:#e2e8f0;--text-dim:#94a3b8;--gold:#f59e0b;--gold-light:#fcd34d;--accent:#06b6d4;--border:#2d2d4a}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:680px;margin:0 auto;padding:20px}
.header{text-align:center;padding:40px 0 20px}
.badge{display:inline-block;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:16px}
.header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#fff,var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:var(--text-dim);font-size:14px}
.emoji-badge{font-size:48px;margin-bottom:12px}
.progress-wrap{margin:24px 0}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:8px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .4s ease}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;margin-bottom:20px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.question-dim{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.question-text{font-size:16px;font-weight:600;color:#fff;margin-bottom:24px;line-height:1.7}
.options{display:flex;flex-direction:column;gap:10px}
.option{background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--text);display:flex;align-items:flex-start;gap:12px}
.option:hover{border-color:var(--primary);background:rgba(99,102,241,.08)}
.option.selected{border-color:var(--primary);background:rgba(99,102,241,.15);box-shadow:0 0 0 1px var(--primary)}
.option .opt-letter{font-weight:800;color:var(--primary);min-width:20px}
.option.selected .opt-letter{color:var(--gold-light)}
.option .opt-text{flex:1}
.nav-row{display:flex;gap:12px;margin-top:24px}
.btn{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text-dim);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--text-dim);color:var(--text)}
.start-rules{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;text-align:left;margin-bottom:28px}
.start-rules h3{font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.start-rules ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.start-rules li{font-size:13px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.start-rules li::before{content:"92";color:var(--primary);font-weight:bold}
.hidden{display:none!important}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:24px;overflow:hidden;margin-bottom:20px}
.result-header{background:linear-gradient(135deg,var(--primary-dark),#2d1b69);padding:40px 28px 48px;text-align:center;position:relative}
.result-header::after{content:"";position:absolute;bottom:-20px;left:0;right:0;height:40px;background:var(--card);border-radius:50% 50% 0 0}
.result-emoji{font-size:52px;margin-bottom:6px}
.result-type-code{font-size:52px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#fff,var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:4px}
.result-type-name{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px}
.result-similarity{font-size:13px;color:rgba(255,255,255,.7);margin-top:6px}
.result-similarity span{color:var(--gold-light);font-weight:700;font-size:17px}
.result-openai{font-size:14px;color:rgba(255,255,255,.65);font-style:italic;margin-top:16px;line-height:1.7;padding:0 20px}
.result-section{padding:24px 28px;border-bottom:1px solid var(--border)}
.result-section:last-child{border-bottom:none}
.result-section h3{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.result-desc{font-size:14px;color:var(--text);line-height:1.9}
.result-tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;font-size:12px;padding:5px 12px;border-radius:20px}
.tag.gold{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:var(--gold-light)}
.result-pos{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:10px;padding:12px 16px;font-size:13px;color:#67e8f9;line-height:1.7;margin-bottom:8px}
.result-buddy{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--gold-light);line-height:1.7;margin-top:6px}
.dim-vector-row{font-family:"Courier New",monospace;font-size:12px;color:var(--text-dim);letter-spacing:2px;background:rgba(0,0,0,.3);padding:12px 16px;border-radius:10px;text-align:center;margin-bottom:16px;line-height:2.2;word-break:break-all}
.dim-vector-row .H{color:#f87171;font-weight:bold}
.dim-vector-row .M{color:var(--gold);font-weight:bold}
.dim-vector-row .L{color:#6b7280;font-weight:bold}
.dim-chip-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dim-group-title{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px;grid-column:1/-1}
.dim-chip{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.dim-chip-label{font-size:11px;color:var(--text-dim)}
.dim-chip-val{font-size:13px;font-weight:800}
.dim-chip-val.H{color:#f87171}
.dim-chip-val.M{color:var(--gold)}
.dim-chip-val.L{color:#6b7280}
.share-section{text-align:center;padding:20px 24px}
.share-title{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.share-text-box{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;padding:16px 20px;font-size:14px;color:var(--text);line-height:1.7;margin-bottom:8px}
.share-text-box span{color:var(--gold-light);font-weight:700}
.hashtags{font-size:12px;color:var(--accent);margin-top:6px;line-height:1.8}
.btn-restart{background:linear-gradient(135deg,var(--gold),#d97706);color:#fff;width:100%;padding:16px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:10px;transition:all .2s}
.btn-restart:hover{opacity:.9;transform:translateY(-1px)}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--text-dim);opacity:.5}
@media(max-width:480px){.header h1{font-size:22px}.question-card{padding:24px 20px}.question-text{font-size:15px}.result-type-code{font-size:42px}.dim-chip-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="emoji-badge">🎯</div>
    <div class="badge">国际学校 · 模拟商战专属</div>
    <h1>SBTI 商赛人格测试</h1>
    <p>30道题 · 找到你在商业模拟中的天生角色</p>
  </div>
  <div class="progress-wrap hidden" id="progressWrap">
    <div class="progress-info"><span id="progressText">题目 1 / 30</span><span id="progressPct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div id="startScreen">
    <div class="start-rules">
      <h3>测试规则</h3>
      <ul>
        <li>共 30 道选择题，每题 A / B / C 三个选项</li>
        <li>每个选项对应 1 / 2 / 3 分，答完自动汇总</li>
        <li>每2题汇总为一个维度，得到 L / M / H 档位</li>
        <li>15个档位向量与25种商赛人格逐一比对相似度</li>
        <li>完成后立即生成你的专属人格报告</li>
      </ul>
    </div>
    <button class="btn btn-primary" onclick="startTest()" style="width:100%;padding:16px;font-size:16px;">开始测试 →</button>
  </div>
  <div id="questionScreen" class="hidden">
    <div class="question-card">
      <div class="question-dim" id="qDim"></div>
      <div class="question-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="nav-row">
        <button class="btn btn-ghost" id="btnPrev" onclick="prevQuestion()">← 上一题</button>
        <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()" disabled>下一题 →</button>
      </div>
    </div>
  </div>
  <div id="resultScreen" class="result-screen"></div>
  <div class="footer">SBTI 商赛人格测试 · 财商小将出品</div>
</div>

<script>
var QUESTIONS=[
  {dim:"S1 · 自尊自信",q:"商赛路演现场，评委当众质疑你的方案，说「这个想法太天真了」。你的内心：",opts:[{l:"A",t:"完了完了完了…我在台上快石化了…",s:1},{l:"B",t:"有点尴尬，但我先记下来，下来再复盘",s:2},{l:"C",t:"谢谢评委，这正好逼我想得更周全",s:3}]},
  {dim:"S1 · 自尊自信",q:"组队时，你的队友全是名校大神，你会：",opts:[{l:"A",t:"我是不是来凑数的…算了少说话多干活",s:1},{l:"B",t:"每个人都有自己的位置",s:2},{l:"C",t:"强强联手，正好我也有一套想法",s:3}]},
  {dim:"S2 · 自我清晰度",q:"你非常清楚自己在商业模拟中最擅长什么：",opts:[{l:"A",t:"其实我也挺模糊的，还在摸索",s:1},{l:"B",t:"大概有个方向，不是很确定",s:2},{l:"C",t:"我的核心优势在哪里，我非常清楚",s:3}]},
  {dim:"S2 · 自我清晰度",q:"你有一个真正想追求的商业方向或创业想法：",opts:[{l:"A",t:"说实话，我还没想清楚",s:1},{l:"B",t:"也许有，也许没有",s:2},{l:"C",t:"有，而且我已经在观察和研究了",s:3}]},
  {dim:"S3 · 核心价值",q:"「参加商赛，就是为了赢、为了证明自己是最强的」：",opts:[{l:"A",t:"我不是",s:1},{l:"B",t:"不完全是，但我也不想输",s:2},{l:"C",t:"没错，这就是我来的原因",s:3}]},
  {dim:"S3 · 核心价值",q:"别人怎么看你的商业决策，对你来说重要吗？",opts:[{l:"A",t:"非常重要，我会在意每个人的评价",s:1},{l:"B",t:"有些人很重要，有些无所谓",s:2},{l:"C",t:"吊毛无所吊谓，我只看我认定的方向",s:3}]},
  {dim:"E1 · 依恋安全感",q:"你的队友在群里突然不说话了，已读不回超过12小时。你第一时间会想：",opts:[{l:"A",t:"是不是我之前说错话了，他不想跟我合作了",s:1},{l:"B",t:"在想要不要私信问一下",s:2},{l:"C",t:"可能在忙吧，我做我自己的部分",s:3}]},
  {dim:"E1 · 依恋安全感",q:"在团队合作中，你是否经常担心被队友排斥或取代：",opts:[{l:"A",t:"是的，我经常有这种感觉",s:1},{l:"B",t:"偶尔会，尤其刚组队时",s:2},{l:"C",t:"不会，我相信自己的价值",s:3}]},
  {dim:"E2 · 情感投入度",q:"你对待团队和比赛的态度是：",opts:[{l:"A",t:"就是个比赛嘛，没必要太当真",s:1},{l:"B",t:"认真对待，但也别太上头",s:2},{l:"C",t:"全力以赴，每一场都当成真实的战役",s:3}]},
  {dim:"E2 · 情感投入度",q:"你的队友是一位能力很强、资源丰富、人脉广泛的大神（且本人非常有魅力）。此时你更容易：",opts:[{l:"A",t:"保持距离，不想太依赖对方，也怕被看低",s:1},{l:"B",t:"合作归合作，但我也有自己的判断",s:2},{l:"C",t:"全身心投入这种高质量合作，向他学习",s:3}]},
  {dim:"E3 · 边界与依赖",q:"比赛期间，队友想和你每天一起刷夜、深度绑定工作。你会：",opts:[{l:"A",t:"正合我意！并肩作战效率更高",s:3},{l:"B",t:"看情况，有些任务适合配合，有些不需要",s:2},{l:"C",t:"我需要保留自己的独立空间，独立思考",s:1}]},
  {dim:"E3 · 边界与依赖",q:"在任何合作关系里，你都希望保持一定的个人空间：",opts:[{l:"A",t:"是的，距离感让我更舒服",s:3},{l:"B",t:"看情况",s:2},{l:"C",t:"我更喜欢深度捆绑，大家绑定在一起",s:1}]},
  {dim:"A1 · 世界观倾向",q:"你认为商业世界里，大多数人是：",opts:[{l:"A",t:"利益驱动，笑里藏刀，防人之心不可无",s:1},{l:"B",t:"分人，大部分普通人，小部分值得信任",s:2},{l:"C",t:"相信共赢，正向合作才是主流",s:3}]},
  {dim:"A1 · 世界观倾向",q:"比赛间隙，一位陌生的外校参赛者主动过来跟你分享商业方案，希望互换联系方式后续合作。你第一反应是：",opts:[{l:"A",t:"谢谢，但先观望一下",s:1},{l:"B",t:"好的，加个微信了解一下",s:2},{l:"C",t:"太棒了！这种主动连接说不定能产生新火花",s:3}]},
  {dim:"A2 · 规则与灵活度",q:"商赛期间，有一场关键比赛撞上了学校期中考试。学校规定必须参加考试，但你的队友极力邀请你参加比赛。你会：",opts:[{l:"A",t:"规矩就是规矩，找老师申请缓考或两边协调",s:2},{l:"B",t:"偶尔一次而已，直接翘课去比赛",s:1},{l:"C",t:"考试重要还是比赛重要？当然是考试，下次再说",s:3}]},
  {dim:"A2 · 规则与灵活度",q:"「我喜欢走自己的路，不喜欢被规则和框架束缚」：",opts:[{l:"A",t:"认同，我就喜欢打破常规",s:1},{l:"B",t:"部分同意，有些规则合理，有些不合理",s:2},{l:"C",t:"不认同，没有规矩不成方圆",s:3}]},
  {dim:"A3 · 人生意义感",q:"你参加每一场商赛，通常：",opts:[{l:"A",t:"临时起意，没有特别的目标，走一步看一步",s:1},{l:"B",t:"有大方向，但具体目标看情况",s:2},{l:"C",t:"有非常清晰的目标，每一步都在为它铺路",s:3}]},
  {dim:"A3 · 人生意义感",q:"「说到底，商业不过是一场利益游戏，所谓的梦想和使命只是包装出来的故事」：",opts:[{l:"A",t:"没错，就是这么回事",s:1},{l:"B",t:"有一定道理，但也不完全",s:2},{l:"C",t:"不对，真正有使命感的商业才能走远",s:3}]},
  {dim:"Ac1 · 动机导向",q:"「我做事情，主要是为了拿到实际成果，而不是为了避免犯错或显得安全」：",opts:[{l:"A",t:"不是，我更多是在躲避麻烦",s:1},{l:"B",t:"两者都有，看情况",s:2},{l:"C",t:"是的，我要的是结果，不是安全感",s:3}]},
  {dim:"Ac1 · 动机导向",q:"商业模拟进行到一半，你的方案数据很不乐观，亏损严重。此时你更像：",opts:[{l:"A",t:"继续按原方案执行，相信概率会回归",s:1},{l:"B",t:"拍一下脑袋，然后尝试调整策略",s:2},{l:"C",t:"立即停损，重新构建新的方案",s:3}]},
  {dim:"Ac2 · 决策风格",q:"比赛中突然遇到一个高风险高回报的机会，需要立刻做决策。你会：",opts:[{l:"A",t:"纠结很久，想把所有可能性都分析完",s:1},{l:"B",t:"先凭直觉押注，下来再复盘",s:2},{l:"C",t:"快速权衡，当机立断",s:3}]},
  {dim:"Ac2 · 决策风格",q:"面对一个有风险的新产品方案，队里还有人在犹豫，你会：",opts:[{l:"A",t:"做了再说，错误是最好的学习素材",s:1},{l:"B",t:"让大家先说说理由，然后我来做最终判断",s:2},{l:"C",t:"没有充分数据支撑就不做，等准备好了再行动",s:3}]},
  {dim:"Ac3 · 执行模式",q:"别人评价你「执行力很强」，你的反应更接近：",opts:[{l:"A",t:"确实，被逼到墙角时我能爆发出很强的执行力",s:1},{l:"B",t:"有时候吧，也不是每次都这样",s:2},{l:"C",t:"当然，事情本该被推进，执行是基本素养",s:3}]},
  {dim:"Ac3 · 执行模式",q:"你的商业计划执行方式是：",opts:[{l:"A",t:"走一步看一步，计划赶不上变化",s:1},{l:"B",t:"有计划，但会根据实际情况灵活调整",s:2},{l:"C",t:"我的计划是铁的，打扰我执行我会很不爽",s:3}]},
  {dim:"So1 · 社交主动性",q:"因商赛培训你认识了很多外校的同学，其中有人邀请你赛后一起去做一个真实的创业项目。你的想法是：",opts:[{l:"A",t:"网上聊聊就行了，真的要一起干有点忐忑",s:1},{l:"B",t:"可以了解一下，看看大家合不合拍",s:2},{l:"C",t:"太棒了！这就是我一直想要的资源和人脉",s:3}]},
  {dim:"So1 · 社交主动性",q:"比赛之余，你的队友带来了他另外学校的朋友一起加入讨论。你的状态更接近：",opts:[{l:"A",t:"我对「队友的朋友」天然有距离感，不太说话",s:1},{l:"B",t:"看对方是什么人，能聊就聊",s:2},{l:"C",t:"朋友的朋友就是我的朋友，多认识人没坏处",s:3}]},
  {dim:"So2 · 人际边界感",q:"「我和人合作主打一个清晰边界，各管各的，太近我会自动报警」：",opts:[{l:"A",t:"认同，我不喜欢边界被侵犯",s:3},{l:"B",t:"看关系",s:2},{l:"C",t:"不认同，深度连接才是有价值的合作",s:1}]},
  {dim:"So2 · 人际边界感",q:"你渴望和信任的队友达到一种「革命情感」，默契到不用说太多也能懂对方：",opts:[{l:"A",t:"认同，这是我理想的合作关系",s:3},{l:"B",t:"有的话挺好，没有也无所谓",s:2},{l:"C",t:"我不渴望这种黏糊的关系，保持专业距离更好",s:1}]},

// ======== 核心逻辑 ========
var answers = new Array(30).fill(null);
var currentQ = 0;

function startTest() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('questionScreen').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  renderQuestion(0);
}

function renderQuestion(idx) {
  currentQ = idx;
  var q = QUESTIONS[idx];
  document.getElementById('qDim').innerHTML = q.dim;
  document.getElementById('qText').innerHTML = q.q;
  var optsHtml = q.opts.map(function(o, i) {
    var sel = answers[idx] === o.s ? ' selected' : '';
    return '<div class="option'+sel+'" onclick="selectOption('+o.s+')"><span class="opt-letter">'+o.l+'</span><span class="opt-text">'+o.t+'</span></div>';
  }).join('');
  document.getElementById('options').innerHTML = optsHtml;
  document.getElementById('btnPrev').disabled = idx === 0;
  var nextBtn = document.getElementById('btnNext');
  nextBtn.disabled = answers[idx] === null;
  nextBtn.textContent = idx === 29 ? '查看结果 →' : '下一题 →';
  updateProgress(idx);
}

function selectOption(score) {
  answers[currentQ] = score;
  var opts = document.querySelectorAll('.option');
  opts.forEach(function(o, i) {
    o.classList.remove('selected');
    if (QUESTIONS[currentQ].opts[i].s === score) o.classList.add('selected');
  });
  document.getElementById('btnNext').disabled = false;
}

function nextQuestion() {
  if (currentQ < 29) renderQuestion(currentQ + 1);
  else showResult();
}

function prevQuestion() {
  if (currentQ > 0) renderQuestion(currentQ - 1);
}

function updateProgress(idx) {
  var pct = Math.round((idx / 30) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressText').textContent = '题目 ' + (idx + 1) + ' / 30';
}

// ======== 计分 & 人格匹配 ========
function scoreToLevel(raw) {
  if (raw <= 3) return 'L';
  if (raw === 4) return 'M';
  return 'H';
}

function calcDimLevels() {
  var levels = [];
  for (var i = 0; i < 15; i++) {
    var raw = (answers[i*2] || 0) + (answers[i*2+1] || 0);
    levels.push(scoreToLevel(raw));
  }
  return levels;
}

function levelToNum(l) { return l === 'H' ? 3 : l === 'M' ? 2 : 1; }

function calcDistance(userVec, pattern) {
  var dist = 0;
  for (var i = 0; i < 15; i++) {
    dist += Math.abs(levelToNum(userVec[i]) - levelToNum(pattern[i]));
  }
  return dist;
}

function numToLevel(n) { return n === 3 ? 'H' : n === 2 ? 'M' : 'L'; }

function getDimGroupName(i) {
  if (i < 3) return '自我模型 S';
  if (i < 6) return '情感模型 E';
  if (i < 9) return '态度模型 A';
  if (i < 12) return '行动驱力 Ac';
  return '社交模型 So';
}

function getDimName(i) {
  var names = ['S1自尊','S2清晰度','S3价值','E1安全感','E2投入度','E3边界','A1世界观','A2规则','A3意义','Ac1动机','Ac2决策','Ac3执行','So1主动','So2边界','So3真实'];
  return names[i] || ('D'+(i+1));
}
